<!doctype html><html lang="en"><head><meta charset="utf-8"><style>
/* Adloom demo artboard — strict grid over an AI plate.
   Real projects embed brand fonts via scripts/fontface.mjs; the demo uses system faces. */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden}
.art{position:relative;width:1080px;height:1350px;overflow:hidden;
  font-family:"Segoe UI",system-ui,-apple-system,sans-serif;
  display:flex;flex-direction:column;justify-content:space-between;padding:78px}
.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.stop{position:absolute;left:0;right:0;top:0;height:38%;z-index:1;
  background:linear-gradient(180deg,rgba(18,32,28,.82) 0%,rgba(18,32,28,.45) 45%,transparent 100%)}
.sbot{position:absolute;left:0;right:0;bottom:0;height:20%;z-index:1;
  background:linear-gradient(0deg,rgba(18,32,28,.85) 0%,transparent 100%)}
.header{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:22px}
.eye{color:#D8B98A;font-weight:800;font-size:26px;letter-spacing:.32em;text-transform:uppercase;line-height:1}
.h1{color:#fff;font-weight:700;line-height:1.16;font-size:76px;text-align:center}
.h1 .hot{color:#D8B98A}
.footer{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between}
.logo{color:#fff;font-weight:800;font-size:40px;letter-spacing:.14em}
.logo i{font-style:normal;color:#D8B98A}
.cta{background:#D8B98A;color:#1F3A33;font-weight:700;font-size:34px;padding:19px 50px;border-radius:999px;line-height:1}
</style></head><body>
<div class="art">
  <img class="bg" src="plate_4x5.png">
  <div class="stop"></div><div class="sbot"></div>
  <header class="header">
    <div class="eye">SLOW MORNINGS</div>
    <div class="h1">Your first cup,<br><span class="hot">poured with intent</span></div>
  </header>
  <footer class="footer"><div class="logo">DRIP<i>&amp;</i>CO</div><div class="cta">Find your roast</div></footer>
</div></body></html>
